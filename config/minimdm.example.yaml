minimdm:

  # --- Webhooks (optional) ---
  # miniMDM can notify external systems when lifecycle events occur.
  # Three events are supported:
  #   record.created    — a new record was created directly as active
  #   record.published  — a draft was promoted to active
  #   record.retired    — an active record was transitioned to retired
  # Multiple URLs can be registered for the same event.
  # Delivery is asynchronous; failures are logged but never affect the API caller.
  #
  # webhooks:
  #   - event: record.created
  #     url: https://example.com/hooks/minimdm
  #   - event: record.published
  #     url: https://example.com/hooks/minimdm
  #   - event: record.retired
  #     url: https://example.com/hooks/minimdm

  schemas:
    # Replace 'mycompany' with a short identifier for your organisation or domain.
    # You can define multiple schemas in the same file.
    mycompany:
      objects:

        # --- Supplier ---
        # A standalone object with required fields, an optional field, and a unique code.
        # owner and steward are optional free-text governance fields displayed in the UI.
        supplier:
          name: Supplier
          description: External suppliers and vendors
          # owner: Procurement Team       # Who is responsible for this object type
          # steward: jane.smith@example.com  # Who maintains data quality day-to-day
          attributes:
            code:
              name: Supplier Code
              type: string
              required: true
              unique: true
            name:
              name: Supplier Name
              type: string
              required: true
            country:
              name: Country
              type: string
            email:
              name: Contact Email
              type: email
            active:
              name: Active
              type: boolean

        # --- Product Category ---
        # A standalone object used as a parent for products.
        # allow_retire: false prevents this reference data from being retired via the API.
        # allow_direct_active_import: false forces all bulk imports to go through draft review.
        product_category:
          name: Product Category
          description: Top-level grouping for products
          allow_retire: false
          allow_direct_active_import: false
          attributes:
            code:
              name: Category Code
              type: string
              required: true
              unique: true
            name:
              name: Category Name
              type: string
              required: true

        # --- Product ---
        # A child of product_category (parent relationship) with a cross-object
        # reference to supplier and a numeric attribute.
        # require_change_reason forces editors to document why a product was changed.
        # requires_draft: true means new products always start as a draft — a Publisher
        # must approve them before they become the active golden record.
        product:
          name: Product
          description: Products sourced from suppliers
          parent: product_category
          require_change_reason: true
          requires_draft: true
          attributes:
            sku:
              name: SKU
              type: string
              required: true
              unique: true
            name:
              name: Product Name
              type: string
              required: true
            unit_price:
              name: Unit Price
              type: numeric
            introduced_on:
              name: Introduced On
              type: date
            preferred_supplier:
              name: Preferred Supplier
              reference: supplier

    # --- Demo schema ---
    # A fuller example showing more attribute types and a customer object.
    # Sample import data for all four objects is provided in the demo/ folder.
    nordkraft:
      objects:

        supplier:
          name: Supplier
          description: External suppliers and vendors
          owner: Procurement Team
          steward: procurement@nordkraft.example
          attributes:
            code:
              name: Supplier Code
              type: string
              required: true
              unique: true
            name:
              name: Supplier Name
              type: string
              required: true
            country:
              name: Country
              type: string
            contact_email:
              name: Contact Email
              type: email
            payment_terms:
              name: Payment Terms
              type: string
            active:
              name: Active
              type: boolean

        product_category:
          name: Product Category
          description: Top-level product grouping
          owner: Product Management
          attributes:
            code:
              name: Category Code
              type: string
              required: true
              unique: true
            name:
              name: Category Name
              type: string
              required: true
            description:
              name: Description
              type: string

        product:
          name: Product
          description: Products in the catalog
          parent: product_category
          steward: catalog@nordkraft.example
          attributes:
            sku:
              name: SKU
              type: string
              required: true
              unique: true
            name:
              name: Product Name
              type: string
              required: true
            unit_price:
              name: Unit Price
              type: numeric
            stock_qty:
              name: Stock Quantity
              type: integer
            introduced_on:
              name: Introduced On
              type: date
            active:
              name: Active
              type: boolean
            preferred_supplier:
              name: Preferred Supplier
              reference: supplier

        customer:
          name: Customer
          description: Business customers and accounts
          attributes:
            code:
              name: Customer Code
              type: string
              required: true
              unique: true
            name:
              name: Company Name
              type: string
              required: true
            industry:
              name: Industry
              type: string
            country:
              name: Country
              type: string
            contact_email:
              name: Contact Email
              type: email
            annual_revenue:
              name: Annual Revenue (MEUR)
              type: numeric
            customer_since:
              name: Customer Since
              type: date
            active:
              name: Active
              type: boolean
