name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  # Runs ruff on every push. No database needed — fails fast on style errors.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff check
        run: uv run ruff check .

  # ── Security ─────────────────────────────────────────────────────────────────
  # Checks all dependencies against the OSV vulnerability database.
  security:
    name: Dependency security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: pip-audit
        run: uv run --with pip-audit pip-audit

  # ── Test ────────────────────────────────────────────────────────────────────
  # Runs the full test suite against a real PostgreSQL database.
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: minimdm
          POSTGRES_PASSWORD: minimdm
          POSTGRES_DB: minimdm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        env:
          TEST_DATABASE_URL: postgresql://minimdm:minimdm@localhost:5432/minimdm_test
          DATABASE_URL: postgresql://minimdm:minimdm@localhost:5432/minimdm_test
          SECRET_KEY: ci-test-secret-key-do-not-use-in-production
          CONFIG_FILE: config/minimdm.example.yaml
        run: uv run pytest --tb=short --ignore=tests/browser

  # ── Browser tests ────────────────────────────────────────────────────────────
  # Runs the Playwright end-to-end suite against a real server and database.
  # Separated from the unit/integration job so the browser binary install and
  # slower test run do not block the fast feedback loop.
  browser-test:
    name: Browser tests (Playwright)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: minimdm
          POSTGRES_PASSWORD: minimdm
          POSTGRES_DB: minimdm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Install Playwright browser
        run: uv run playwright install chromium --with-deps

      - name: Run browser tests
        env:
          TEST_DATABASE_URL: postgresql://minimdm:minimdm@localhost:5432/minimdm_test
          DATABASE_URL: postgresql://minimdm:minimdm@localhost:5432/minimdm_test
          SECRET_KEY: ci-test-secret-key-do-not-use-in-production
          CONFIG_FILE: config/minimdm.example.yaml
        run: uv run pytest tests/browser/ --tb=short
