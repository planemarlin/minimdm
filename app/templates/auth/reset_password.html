<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset password – {{ app_name }}</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-card__brand">{{ app_name }}</div>
    <h1 class="login-card__title">Reset password</h1>

    <div id="reset-error" class="alert alert-error" style="display:none"></div>
    <div id="reset-success" class="alert alert-success" style="display:none"></div>

    <form id="reset-form" autocomplete="off">
      <input type="hidden" id="reset-token" value="{{ token | e }}" />
      <div class="form-group">
        <label for="new-password">New password</label>
        <input type="password" id="new-password" name="password"
               autocomplete="new-password" required minlength="12" />
        <span class="form-hint">Minimum 12 characters</span>
      </div>
      <div class="form-group">
        <label for="confirm-password">Confirm password</label>
        <input type="password" id="confirm-password" name="confirm_password"
               autocomplete="new-password" required minlength="12" />
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" style="width:100%" id="reset-btn">
          Set new password
        </button>
      </div>
    </form>
  </div>

  <script>
    document.getElementById("reset-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("reset-btn");
      const errEl = document.getElementById("reset-error");
      const okEl  = document.getElementById("reset-success");
      errEl.style.display = "none";
      okEl.style.display  = "none";

      const password = document.getElementById("new-password").value;
      const confirm  = document.getElementById("confirm-password").value;
      const token    = document.getElementById("reset-token").value;

      if (password !== confirm) {
        errEl.textContent = "Passwords do not match.";
        errEl.style.display = "flex";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Saving…";

      try {
        const res = await fetch("/api/auth/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, password }),
        });

        if (res.ok) {
          document.getElementById("reset-form").style.display = "none";
          okEl.textContent = "Password updated. You can now sign in with your new password.";
          okEl.style.display = "flex";
          setTimeout(() => { window.location.href = "/login"; }, 2500);
        } else {
          const data = await res.json().catch(() => ({}));
          errEl.textContent = data.detail || "Failed to reset password.";
          errEl.style.display = "flex";
          btn.disabled = false;
          btn.textContent = "Set new password";
        }
      } catch {
        errEl.textContent = "Could not reach the server. Please try again.";
        errEl.style.display = "flex";
        btn.disabled = false;
        btn.textContent = "Set new password";
      }
    });
  </script>
</body>
</html>
