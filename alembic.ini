# Alembic configuration for miniMDM.
# The sqlalchemy.url value below is a placeholder; the actual URL is injected
# at runtime from settings.database_url inside alembic/env.py.

[alembic]
script_location = alembic
file_template = %%(rev)s_%%(slug)s
truncate_slug_length = 60
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
